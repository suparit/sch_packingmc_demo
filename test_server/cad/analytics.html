<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Analytics Dashboard — SMD Reel Packing Digital Twin</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0c0f;--surface:#111318;--surface2:#1a1d24;--border:#2a2d38;
      --text:#e8eaf0;--muted:#6b7080;--teal:#00c9a7;--purple:#a78bfa;--amber:#fbbf24;
    }
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;padding:20px}
    header{display:flex;align-items:center;justify-content:space-between;padding-bottom:15px;border-bottom:1px solid var(--border);margin-bottom:20px}
    .brand{font-weight:700;font-size:16px;letter-spacing:0.5px}
    .brand span{color:var(--teal)}
    .nav-btn{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:8px 16px;border-radius:6px;text-decoration:none;font-size:13px;font-weight:600;transition:all 0.2s}
    .nav-btn:hover{border-color:var(--teal);color:var(--teal)}
    
    .grid-layout{display:grid;grid-template-columns:repeat(auto-fit, minmax(450px, 1fr));gap:20px;margin-bottom:20px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;display:flex;flex-direction:column;gap:15px}
    .card-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
    
    .kpi-container{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:20px;margin-bottom:20px}
    .kpi-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:15px;text-align:center}
    .kpi-val{font-size:28px;font-weight:700;color:var(--teal);font-family:monospace;margin-top:5px}
    
    .chart-container{position:relative;width:100%;height:300px}
  </style>
</head>
<body>

  <header>
    <div class="brand">📊 Taping <span>PRODUCTION ANALYTICS (REAL-TIME)</span></div>
    <a href="index1.html" class="nav-btn">🔌 Open 3D Live Twin</a>
  </header>

  <div class="kpi-container">
    <div class="kpi-card">
      <div class="card-title">Total Cycles Completed</div>
      <div id="kpi-total-cycles" class="kpi-val">0</div>
    </div>
    <div class="kpi-card">
      <div class="card-title">Avg Loop Speed (Sec)</div>
      <div id="kpi-avg-time" class="kpi-val" style="color:var(--purple)">0.0s</div>
    </div>
  </div>

  <div class="grid-layout">
    <div class="card">
      <div class="card-title">📈 Cycle Time Trend (OEE Efficiency)</div>
      <div class="chart-container">
        <canvas id="cycleChart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title">⏳ Bottleneck Analysis (Avg Duration per State)</div>
      <div class="chart-container">
        <canvas id="stateChart"></canvas>
      </div>
    </div>
  </div>

<script>
  let ws;
  let cycleChart, stateChart;
  let pollInterval = null; // 🚨 ตัวแปรสำหรับถือสายคุม Loop จังหวะส่งคำสั่งดึงสถิติ

  // ฟังก์ชันเริ่มต้นระบบกราฟิก Chart.js
  function initCharts() {
    const ctx1 = document.getElementById('cycleChart').getContext('2d');
    cycleChart = new Chart(ctx1, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'Total Loop Duration (Sec)',
          data: [],
          borderColor: '#00c9a7',
          backgroundColor: 'rgba(0, 201, 167, 0.05)',
          borderWidth: 2,
          tension: 0.2,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#2a2d38' }, ticks: { color: '#6b7080' } },
          y: { grid: { color: '#2a2d38' }, ticks: { color: '#6b7080' }, title: { display: true, text: 'Seconds', color: '#6b7080' } }
        }
      }
    });

    const ctx2 = document.getElementById('stateChart').getContext('2d');
    stateChart = new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: [],
        datasets: [{
          label: 'Avg Seconds spent',
          data: [],
          backgroundColor: 'rgba(167, 139, 250, 0.7)',
          borderColor: '#a78bfa',
          borderWidth: 1,
          borderRadius: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#6b7080', font: { size: 9 } } },
          y: { grid: { color: '#2a2d38' }, ticks: { color: '#6b7080' } }
        }
      }
    });
  }

  function connectGateway() {
    ws = new WebSocket("ws://localhost:8765");

    ws.onopen = () => {
      console.log("⚡ Analytics Live Linked to System FSM Core.");
      
      // สเตปดึงข้อมูลครั้งแรกทันทีที่เปิดหน้าต่างสำเร็จ
      ws.send(JSON.stringify({ action: "GET_ANALYTICS" }));

      // 🚨🎯 ไฮไลท์การทำ Real-time Polling: สั่งยิงดึงสถิติมารีเฟรชกราฟออโต้ทุกๆ 2 วินาที (2000 ms) โดยไม่ต้องกด F5
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(() => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ action: "GET_ANALYTICS" }));
        }
      }, 2000);
    };

    ws.onmessage = (event) => {
      const raw = JSON.parse(event.data);
      
      if (raw.type === "ANALYTICS_RESPONSE") {
        const data = raw.data;
        
        // ถ้าฐานข้อมูล SQL ยังว่างเปล่า (พึ่งเริ่มรัน) ให้รอรอบถัดไป
        if (!data.cycles_data || data.cycles_data.length === 0) return;

        // 1. อัปเดตกราฟเส้นประวัติราย Cycle (OEE Trend)
        const cycleLabels = data.cycles_data.map(item => `Cycle ${item.cycle}`);
        const cycleDurations = data.cycles_data.map(item => item.duration);
        
        cycleChart.data.labels = cycleLabels;
        cycleChart.data.datasets[0].data = cycleDurations;
        cycleChart.update();
        
        // คำนวณและดีดตัวเลข KPI การผลิตด้านบนแบบ Real-time
        if(cycleDurations.length > 0) {
          document.getElementById('kpi-total-cycles').innerText = data.cycles_data[data.cycles_data.length - 1].cycle;
          const sum = cycleDurations.reduce((a, b) => a + b, 0);
          const avg = sum / cycleDurations.length;
          document.getElementById('kpi-avg-time').innerText = avg.toFixed(2) + 's';
        }

        // 2. อัปเดตกราฟแท่งจัดอันดับคอขวด (State Duration Analysis)
        const stateLabels = data.states_avg.map(item => item.state);
        const stateAvgs = data.states_avg.map(item => item.avg_duration);
        
        stateChart.data.labels = stateLabels;
        stateChart.data.datasets[0].data = stateAvgs;
        stateChart.update();
      }
    };

    ws.onclose = () => {
      // หากหลุดจากท่อหลัก ให้สั่งเคลียร์ลูปจับเวลาเพื่อรอกด Reconnect สแกนใหม่
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
      setTimeout(connectGateway, 2000);
    };
  }

  // เปิดใช้งานระบบเมื่อเปิดหน้าจอ
  initCharts();
  connectGateway();
</script>
</body>
</html>
