<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>3D Viewer</title>

  <!-- model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      text-align: center;
    }

    model-viewer {
      width: 100%;
      height: 70vh;
    }

    button {
      font-size: 18px;
      margin: 10px;
      padding: 10px 20px;
    }
  </style>
</head>

<body>

<h2>Machine + Cylinder Test</h2>

<!-- ✅ Machine -->
<model-viewer
  src="./export/machine.glb"
  auto-rotate
  camera-controls>
</model-viewer>

<!-- ✅ Cylinder (จะขยับตัวนี้) -->
<model-viewer
  id="cylinder"
  src="./export/cylinder.glb"
  camera-controls>
</model-viewer>

<br>

<button onclick="extend()">EXTEND</button>
<button onclick="retract()">RETRACT</button>

<script>
let pos = 0;
const cyl = document.getElementById("cylinder");

// ✅ smooth motion
cyl.style.transition = "transform 0.3s";

function extend() {
  pos += 30;   // ยืด
  move();
}

function retract() {
  pos -= 30;   // หด
  move();
}

function move() {
  //(แกน X ลองก่อน ถ้าผิดเดี๋ยวเปลี่ยน)
  cyl.style.transform = "translateX(" + pos + "px)";
}
</script>

</body>
</html>
