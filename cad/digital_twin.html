<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>BK05 — Digital Twin Manual</title>
  <script type="importmap">
    {"imports":{
      "three":"https://unpkg.com/three@0.158.0/build/three.module.js",
      "three/addons/":"https://unpkg.com/three@0.158.0/examples/jsm/"
    }}
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0c0f;--surface:#111318;--surface2:#1a1d24;--border:#2a2d38;
      --text:#e8eaf0;--muted:#6b7080;--teal:#00c9a7;--red:#f87171;--amber:#fbbf24;--purple:#a78bfa;
    }
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
      display:grid;grid-template-columns:1fr 300px;grid-template-rows:48px 1fr;height:100vh;overflow:hidden}
    header{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 16px;
      background:var(--surface);border-bottom:1px solid var(--border)}
    .logo{font-size:12px;font-weight:600;letter-spacing:.08em;color:var(--teal)}
    .htitle{font-size:12px;color:var(--muted)}
    .hdot{width:8px;height:8px;border-radius:50%;background:#4b5563;margin-left:auto;transition:background .3s}
    .hdot.run{background:var(--teal);box-shadow:0 0 6px var(--teal)}
    .hdot.alarm{background:var(--red);box-shadow:0 0 6px var(--red)}
    #hstatus{font-size:12px;color:var(--muted);margin-left:6px}

    #canvas-wrap{position:relative;background:#06080a}
    canvas{display:block;width:100%;height:100%}
    .overlay{position:absolute;top:12px;left:12px;background:rgba(10,12,15,.88);
      border:1px solid var(--border);border-radius:10px;padding:10px 14px;min-width:160px}
    .ov-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
    .ov-state{font-size:20px;font-weight:700;color:var(--teal);line-height:1.1;transition:color .3s}
    .ov-state.alarm{color:var(--red)}
    .ov-desc{font-size:11px;color:var(--muted);margin-top:3px}

    /* step counter badge */
    .step-badge{position:absolute;top:12px;right:12px;background:rgba(0,201,167,.15);
      border:1px solid var(--teal);border-radius:8px;padding:6px 14px;font-size:12px;color:var(--teal)}

    .panel{background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}

    /* Step buttons */
    .steps-wrap{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;
      scrollbar-width:thin;scrollbar-color:var(--border) transparent}

    .step-btn{
      display:flex;align-items:center;gap:10px;
      padding:10px 12px;border-radius:9px;border:1px solid var(--border);
      background:var(--surface2);cursor:pointer;transition:all .2s;text-align:left;width:100%;
    }
    .step-btn:hover:not(:disabled){border-color:var(--teal);background:rgba(0,201,167,.08)}
    .step-btn:disabled{opacity:.3;cursor:not-allowed}
    .step-btn.active{border-color:var(--teal);background:rgba(0,201,167,.12)}
    .step-btn.done{border-color:var(--purple);background:rgba(167,139,250,.08)}
    .step-btn.danger{border-color:var(--red)!important;background:rgba(248,113,113,.1)!important}

    .step-num{width:24px;height:24px;border-radius:50%;background:var(--border);
      color:var(--muted);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .step-btn.active .step-num{background:var(--teal);color:#000}
    .step-btn.done   .step-num{background:var(--purple);color:#fff}
    .step-btn.danger .step-num{background:var(--red);color:#fff}

    .step-info{flex:1}
    .step-name{font-size:12px;font-weight:600;color:var(--muted);transition:color .2s}
    .step-btn.active .step-name{color:var(--teal)}
    .step-btn.done   .step-name{color:var(--text)}
    .step-btn.danger .step-name{color:var(--red)}
    .step-desc{font-size:10px;color:var(--muted);margin-top:2px}

    .step-icon{font-size:16px;flex-shrink:0}

    /* counters */
    .counters{display:flex;border-top:1px solid var(--border);flex-shrink:0}
    .cnt{flex:1;padding:8px;text-align:center;border-right:1px solid var(--border)}
    .cnt:last-child{border-right:none}
    .cnt-val{font-size:16px;font-weight:700;color:var(--teal)}
    .cnt-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:1px}

    /* log */
    .log-wrap{border-top:1px solid var(--border);height:130px;display:flex;flex-direction:column;flex-shrink:0}
    .log-hdr{padding:5px 12px;display:flex;justify-content:space-between;align-items:center}
    .log-clr{font-size:10px;color:var(--muted);cursor:pointer}.log-clr:hover{color:var(--text)}
    .log-body{flex:1;overflow-y:auto;padding:0 12px 6px;font-family:monospace;font-size:10px;
      line-height:1.7;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
    .le .ts{color:#4b5563;margin-right:5px}
    .le.info .ev{color:var(--teal)}.le.warn .ev{color:var(--amber)}.le.err .ev{color:var(--red)}
  </style>
</head>
<body>
<header>
  <span class="logo">BK05</span>
  <span style="color:var(--border)">|</span>
  <span class="htitle">Digital Twin — Manual Mode</span>
  <div class="hdot" id="hdot"></div>
  <span id="hstatus">Idle</span>
</header>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div class="overlay">
    <div class="ov-label">Current State</div>
    <div class="ov-state" id="ovState">READY</div>
    <div class="ov-desc" id="ovDesc">Press START to begin</div>
  </div>
  <div class="step-badge" id="stepBadge">Step —</div>
</div>

<div class="panel">
  <div class="steps-wrap" id="stepsWrap">
    <!-- steps injected by JS -->
  </div>

  <div class="counters">
    <div class="cnt"><div class="cnt-val" id="cPacked">0</div><div class="cnt-lbl">Packed</div></div>
    <div class="cnt"><div class="cnt-val" id="cCycles">0</div><div class="cnt-lbl">Cycles</div></div>
  </div>

  <div class="log-wrap">
    <div class="log-hdr">
      <span style="font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)">Event Log</span>
      <span class="log-clr" onclick="document.getElementById('logBody').innerHTML=''">Clear</span>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Part map (ชื่อจาก Blender ใหม่) ──
const PART_NAMES = {
  roller_collect: 'roller_collect',   // ซ้าย สีม่วง — เก็บงาน
  roller_feed:    'roller_feed',      // ขวา สีเขียว — จ่าย carrier
  carrier_tape:   'carrier_tape',     // carrier tape แถบยาว
  cylinder2:      'cylinder2',        // ดัน carrier ขึ้น +Y
  seal_head:      'seal_head',        // seal head
  cylinder1:      'cylinder1',        // กดลง -Y (seal)
  support_seal:   'support_seal',     // ชุด stamp หลัก กดพร้อม seal_head
  spring:         'Spring',           // spring (ตัว S ใหญ่ตาม Blender)
};

// ── Step definitions ──
const CARRIER_PITCH = 0.08; // 1 pitch = 24.5mm (ปรับได้)

const STEPS = [
  {
    id:'start', name:'START / INIT', icon:'▶',
    desc:'เริ่มระบบ — cylinder2 ดันขึ้น +Y ให้ Push-leg Carrier ดัน carrier ติด Pinch Roller',
    anim: async (ctx) => {
      ctx.hl('cylinder2', ctx.moveMat);
      await ctx.tw('cylinder2', new THREE.Vector3(0,0.08,0), 0.2);
      ctx.log('Cylinder2 ↑ ดัน Push-leg Carrier → carrier ติด Pinch Roller','info');
    }
  },
  {
    // repeatable — กดได้ทุกครั้ง
    id:'feed_carrier', name:'FEED CARRIER', icon:'➡',
    desc:'roller_feed หมุน + carrier เลื่อนไปข้างหน้า +Y พร้อมกัน ทีละ 24.5mm',
    repeatable: true,
    anim: async (ctx) => {
      ctx.hl('roller_feed',  ctx.hlMat);
      ctx.hl('carrier_tape', ctx.moveMat);
      // roller หมุนรอบแกน Z (เหมือนล้อตั้งตรง) + carrier เลื่อน +Y พร้อมกัน
      ctx.twRot('roller_feed', -Math.PI*2, 0.35, 'z');
      await ctx.tw('carrier_tape', new THREE.Vector3(0,CARRIER_PITCH,0), 0.35);
      ctx.log(`FEED: carrier +24.5mm (step ${(window._moves=(window._moves||0)+1)})`,'info');
    }
  },
  {
    id:'index', name:'INDEX', icon:'📍',
    desc:'ตรวจสอบว่ามี Carrier อยู่ในร่อง Guide Rail',
    anim: async (ctx) => {
      ctx.hl('carrier_tape', ctx.hlMat);
      ctx.log('INDEX: Carrier present ✓','info');
    }
  },
  {
    id:'check_index', name:'CHECK_INDEX', icon:'✅',
    desc:'ตรวจสอบ position — carrier อยู่ตำแหน่งที่ถูกต้อง',
    anim: async (ctx) => {
      ctx.hl('carrier_tape', ctx.hlMat);
      ctx.log('CHECK_INDEX: Position OK ✓','info');
    }
  },
  {
    id:'load_part', name:'LOAD_PART', icon:'📦',
    desc:'ยืนยันว่ามีชิ้นงานวางลงใน carrier แล้ว',
    anim: async (ctx) => {
      ctx.hl('carrier_tape', ctx.hlMat);
      ctx.log('LOAD_PART: Component placed ✓','info');
    }
  },
  {
    id:'seal', name:'SEAL', icon:'🔥',
    desc:'cylinder1 ดึง support_seal + seal_head กดลง -Y พร้อมกัน / Spring รับแรงกระแทก → hold → ยกขึ้น',
    anim: async (ctx) => {
      ctx.hl('seal_head',    ctx.warmMat);
      ctx.hl('cylinder1',    ctx.warmMat);
      ctx.hl('support_seal', ctx.warmMat);
      ctx.hl('spring',       ctx.moveMat);
      // กดลงพร้อมกันทั้ง 3 ชิ้น เร็ว 0.15s
      ctx.tw('seal_head',    new THREE.Vector3(0,-0.13,0), 0.15);
      ctx.tw('cylinder1',    new THREE.Vector3(0,-0.10,0), 0.15);
      await ctx.tw('support_seal', new THREE.Vector3(0,-0.13,0), 0.15);
      // Spring กดอัดลง -Y รับแรงกระแทก (กดน้อยกว่า seal)
      await ctx.tw('spring', new THREE.Vector3(0,-0.04,0), 0.10);
      // hold 500ms
      await ctx.wait(500);
      // ยกขึ้นพร้อมกัน — spring คืนตัวก่อน
      ctx.ret('spring',       0.12);
      ctx.ret('seal_head',    0.15);
      ctx.ret('cylinder1',    0.15);
      await ctx.ret('support_seal', 0.15);
      ctx.log('SEAL: Heat + Pressure ✓ / Spring absorbed impact','info');
    }
  },
  {
    id:'vision', name:'VISION', icon:'👁',
    desc:'ตรวจสอบคุณภาพการ Seal',
    anim: async (ctx) => {
      ctx.hl('seal_head', ctx.hlMat);
      await ctx.wait(300);
      ctx.log('VISION: Seal quality OK ✓','info');
    }
  },
  {
    id:'roll', name:'ROLL (เก็บงาน)', icon:'🟣',
    desc:'roller_collect (ซ้าย สีม่วง) หมุนรอบแกน X 1 รอบ เก็บงาน',
    anim: async (ctx) => {
      ctx.hl('roller_collect', ctx.hlMat);
      // หมุนรอบแกน Z (เหมือนล้อตั้งตรง)
      await ctx.twRot('roller_collect', -Math.PI*2, 0.4, 'z');
      ctx.log('Roller Collect ↻ 1 rev (X-axis)','info');
      window._packed = (window._packed||0)+1;
      document.getElementById('cPacked').textContent = window._packed;
    }
  },
  {
    id:'reset', name:'RESET', icon:'↺',
    desc:'รีเซ็ตกลับเริ่มใหม่ทุกอย่าง',
    danger: true,
    anim: async (ctx) => {
      ctx.restoreAll();
      ctx.resetAllPos();
      window._packed=0; window._moves=0;
      document.getElementById('cPacked').textContent='0';
      window._cycles=(window._cycles||0)+1;
      document.getElementById('cCycles').textContent=window._cycles;
      ctx.log('↺ RESET — ready for next cycle','warn');
    }
  },
];

// ── Three.js ──
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06080a);
const camera = new THREE.PerspectiveCamera(45,1,0.01,1000);
const controls = new OrbitControls(camera,canvas);
controls.enableDamping=true;
scene.add(new THREE.AmbientLight(0xffffff,0.75));
const dl=new THREE.DirectionalLight(0xffffff,1.2); dl.position.set(4,6,4); scene.add(dl);
const dl2=new THREE.DirectionalLight(0x6688ff,0.35); dl2.position.set(-4,2,-4); scene.add(dl2);

function resize(){
  const p=canvas.parentElement;
  renderer.setSize(p.clientWidth,p.clientHeight,false);
  camera.aspect=p.clientWidth/p.clientHeight;
  camera.updateProjectionMatrix();
}
resize();
new ResizeObserver(resize).observe(canvas.parentElement);

// ── Mesh registry ──
const meshMap={},origPos={},origMat={};
function reg(role,mesh){
  meshMap[role]=mesh;
  origPos[role]=mesh.position.clone();
  origMat[role]=Array.isArray(mesh.material)?mesh.material.map(m=>m.clone()):mesh.material.clone();
}

// ── Tween (Promise-based) ──
const tweens=[];
function tw(role,delta,durSec){
  return new Promise(resolve=>{
    const mesh=meshMap[role]; if(!mesh){resolve();return;}
    const i=tweens.findIndex(t=>t.role===role); if(i>-1) tweens.splice(i,1);
    tweens.push({role,mesh,from:mesh.position.clone(),
      to:mesh.position.clone().add(delta),dur:durSec,elapsed:0,onDone:resolve});
  });
}
function twRot(role,deltaRot,durSec,axis='x'){
  return new Promise(resolve=>{
    const mesh=meshMap[role]; if(!mesh){resolve();return;}
    const key=role+'_r';
    const i=tweens.findIndex(t=>t.role===key); if(i>-1) tweens.splice(i,1);
    tweens.push({role:key,mesh,fromRot:mesh.rotation[axis],toRot:mesh.rotation[axis]+deltaRot,
      isRot:true,rotAxis:axis,dur:durSec,elapsed:0,onDone:resolve});
  });
}
function ret(role,durSec=0.2){
  return new Promise(resolve=>{
    const mesh=meshMap[role]; if(!mesh||!origPos[role]){resolve();return;}
    const i=tweens.findIndex(t=>t.role===role); if(i>-1) tweens.splice(i,1);
    tweens.push({role,mesh,from:mesh.position.clone(),to:origPos[role].clone(),
      dur:durSec,elapsed:0,onDone:resolve});
  });
}
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }
function ease(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

// ── Materials ──
const hlMat   = new THREE.MeshStandardMaterial({color:0x00c9a7,emissive:0x003322,roughness:0.3});
const alMat   = new THREE.MeshStandardMaterial({color:0xf87171,emissive:0x330000,roughness:0.3});
const warmMat = new THREE.MeshStandardMaterial({color:0xff7700,emissive:0x331100,roughness:0.3});
const moveMat = new THREE.MeshStandardMaterial({color:0xa78bfa,emissive:0x110033,roughness:0.3});

function hl(role,mat){const m=meshMap[role];if(m)m.material=mat;}
function restoreAll(){Object.keys(meshMap).forEach(r=>{const m=meshMap[r];if(m&&origMat[r])m.material=Array.isArray(origMat[r])?origMat[r].map(x=>x.clone()):origMat[r].clone();});}
function resetAllPos(){
  tweens.length=0;
  Object.keys(meshMap).forEach(r=>{const m=meshMap[r];if(m&&origPos[r]){m.position.copy(origPos[r]);m.rotation.set(0,0,0);}});
}

// ctx object passed to each step anim
const ctx = {hl,hlMat,alMat,warmMat,moveMat,tw,twRot,ret,wait,restoreAll,resetAllPos,
  log:(msg,type)=>addLog(msg,type)};

// ── Render loop ──
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  controls.update();
  for(let i=tweens.length-1;i>=0;i--){
    const t=tweens[i]; t.elapsed+=dt;
    const p=Math.min(t.elapsed/t.dur,1),ep=ease(p);
    if(t.isRot) t.mesh.rotation[t.rotAxis||'x']=t.fromRot+(t.toRot-t.fromRot)*ep;
    else t.mesh.position.lerpVectors(t.from,t.to,ep);
    if(p>=1){if(t.onDone)t.onDone();tweens.splice(i,1);}
  }
  renderer.render(scene,camera);
}
animate();

// ── Load GLB ──
new GLTFLoader().load('./export/machine.glb',gltf=>{
  scene.add(gltf.scene);
  const box=new THREE.Box3().setFromObject(gltf.scene);
  const center=box.getCenter(new THREE.Vector3());
  const size=box.getSize(new THREE.Vector3()).length();
  gltf.scene.position.sub(center);
  camera.position.set(0,size*0.3,size*1.15);
  controls.target.set(0,0,0);
  controls.update();
  gltf.scene.traverse(obj=>{
    if(!obj.isMesh) return;
    const role=Object.keys(PART_NAMES).find(r=>PART_NAMES[r]===obj.name);
    if(role) reg(role,obj);
  });
  addLog(`GLB loaded — ${Object.keys(meshMap).length}/${Object.keys(PART_NAMES).length} parts mapped`,'info');
},null,err=>addLog('GLB error: '+err.message,'err'));

// ── Build step buttons ──
let currentStep = -1;
let animating = false;

const wrap = document.getElementById('stepsWrap');

STEPS.forEach((step,idx)=>{
  const btn = document.createElement('button');
  btn.className = 'step-btn';
  btn.id = 'sbtn_'+step.id;
  btn.disabled = idx !== 0; // only first enabled at start
  if(step.danger) btn.classList.add('danger');
  btn.innerHTML=`
    <div class="step-num">${idx+1}</div>
    <div class="step-info">
      <div class="step-name">${step.icon} ${step.name}</div>
      <div class="step-desc">${step.desc}</div>
    </div>
  `;
  btn.onclick = () => runStep(idx);
  wrap.appendChild(btn);
});

async function runStep(idx){
  if(animating) return;
  const step = STEPS[idx];
  animating = true;

  // update UI
  document.querySelectorAll('.step-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('sbtn_'+step.id);
  btn.classList.add('active');

  // update overlay
  document.getElementById('ovState').textContent = step.name;
  document.getElementById('ovDesc').textContent = step.desc;
  document.getElementById('stepBadge').textContent = `Step ${idx+1}/${STEPS.length}`;
  document.getElementById('hdot').className='hdot run';
  document.getElementById('hstatus').textContent='Running';

  addLog(`[Step ${idx+1}] ${step.name}`,'info');

  // restore highlights before each step (except reset)
  if(step.id !== 'reset') restoreAll();

  // run animation
  await step.anim(ctx);

  // mark done
  if(step.id === 'reset'){
    // re-enable all, mark all not done
    document.querySelectorAll('.step-btn').forEach((b,i)=>{
      b.classList.remove('active','done');
      b.disabled = i !== 0;
    });
    currentStep = -1;
  } else {
    btn.classList.remove('active');
    if(!step.repeatable) btn.classList.add('done');
    currentStep = idx;

    // enable next step
    const nextIdx = idx+1;
    if(nextIdx < STEPS.length){
      const nextBtn = document.getElementById('sbtn_'+STEPS[nextIdx].id);
      nextBtn.disabled = false;
      // also keep repeatable step enabled
    }
    // FEED CARRIER และ RESET ให้กดได้ตลอดหลัง START
    const feedBtn = document.getElementById('sbtn_feed_carrier');
    const rstBtn  = document.getElementById('sbtn_reset');
    if(currentStep >= 0) {
      if(feedBtn) feedBtn.disabled = false;
      if(rstBtn)  rstBtn.disabled  = false;
    }
  }

  document.getElementById('hdot').className='hdot';
  document.getElementById('hstatus').textContent='Idle';
  animating = false;
}

// ── Log ──
function addLog(msg,type='info'){
  const b=document.getElementById('logBody');
  const ts=new Date().toTimeString().slice(0,8);
  const el=document.createElement('div');
  el.className='le '+type;
  el.innerHTML=`<span class="ts">${ts}</span><span class="ev">${msg}</span>`;
  b.appendChild(el);b.scrollTop=b.scrollHeight;
}
</script>
</body>
</html>
