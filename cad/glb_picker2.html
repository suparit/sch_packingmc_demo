<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>GLB Part Picker</title>
  <script type="importmap">
    {"imports":{
      "three":"https://unpkg.com/three@0.158.0/build/three.module.js",
      "three/addons/":"https://unpkg.com/three@0.158.0/examples/jsm/"
    }}
  </script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0c0f;color:#e8eaf0;font-family:'Segoe UI',system-ui,sans-serif;display:grid;grid-template-columns:1fr 300px;height:100vh;overflow:hidden}
    #canvas-wrap{position:relative;background:#06080a}
    canvas{display:block;width:100%;height:100%}
    #hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(10,12,15,0.85);border:1px solid #2a2d38;border-radius:8px;padding:8px 16px;font-size:12px;color:#6b7080;pointer-events:none;white-space:nowrap}
    #selected-banner{position:absolute;bottom:16px;left:16px;background:rgba(0,201,167,0.15);border:1px solid #00c9a7;border-radius:8px;padding:10px 16px;font-size:13px;color:#00c9a7;display:none}
    #panel{background:#111318;border-left:1px solid #2a2d38;display:flex;flex-direction:column;overflow:hidden}
    #panel-header{padding:14px 16px;border-bottom:1px solid #2a2d38}
    #panel-header h2{font-size:13px;font-weight:600;color:#00c9a7;margin-bottom:2px}
    #panel-header p{font-size:11px;color:#6b7080}
    #status{padding:8px 16px;font-size:11px;color:#fbbf24;min-height:28px;border-bottom:1px solid #2a2d38}
    #part-list{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:#2a2d38 transparent}
    .part-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;transition:background 0.15s;margin-bottom:2px}
    .part-item:hover{background:#1a1d24}
    .part-item.active{background:rgba(0,201,167,0.12)}
    .part-dot{width:8px;height:8px;border-radius:50%;background:#2a2d38;flex-shrink:0}
    .part-item.active .part-dot{background:#00c9a7;box-shadow:0 0 6px #00c9a7}
    .part-name{font-size:12px;font-family:monospace;color:#6b7080;flex:1}
    .part-item.active .part-name{color:#00c9a7}
    #tag-section{padding:12px 16px;border-top:1px solid #2a2d38}
    #tag-section p{font-size:11px;color:#6b7080;margin-bottom:8px}
    #tag-input{width:100%;background:#1a1d24;border:1px solid #2a2d38;border-radius:6px;padding:7px 10px;color:#e8eaf0;font-size:12px;outline:none}
    #tag-input:focus{border-color:#00c9a7}
    #tag-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
    .quick-tag{font-size:11px;padding:4px 10px;border-radius:6px;background:#1a1d24;border:1px solid #2a2d38;color:#6b7080;cursor:pointer}
    .quick-tag:hover{border-color:#a78bfa;color:#a78bfa}
    #export-btn{margin:12px 16px;padding:9px;background:rgba(0,201,167,0.12);border:1px solid #00c9a7;border-radius:8px;color:#00c9a7;font-size:12px;font-weight:600;cursor:pointer;text-align:center}
    #export-btn:hover{background:rgba(0,201,167,0.22)}
  </style>
</head>
<body>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="hint">คลิกที่ชิ้นส่วนบน 3D เพื่อเลือก | Drag to rotate | Scroll to zoom</div>
  <div id="selected-banner" id="sb"></div>
</div>
<div id="panel">
  <div id="panel-header">
    <h2>GLB Part Picker</h2>
    <p>คลิกชิ้นส่วนบน 3D แล้วตั้งชื่อบทบาท</p>
  </div>
  <div id="status">Loading machine.glb ...</div>
  <div id="part-list"></div>
  <div id="tag-section">
    <p>ตั้งชื่อบทบาทให้ชิ้นส่วนที่เลือก:</p>
    <input type="text" id="tag-input" placeholder="เช่น seal_head, tape_reel" disabled>
    <div id="tag-row">
      <div class="quick-tag" onclick="setTag('seal_head')">seal_head</div>
      <div class="quick-tag" onclick="setTag('tape_reel')">tape_reel</div>
      <div class="quick-tag" onclick="setTag('carrier_tape')">carrier_tape</div>
      <div class="quick-tag" onclick="setTag('frame')">frame</div>
      <div class="quick-tag" onclick="setTag('cover_tape')">cover_tape</div>
    </div>
  </div>
  <div id="export-btn" onclick="exportMap()">Export Part Map as JSON</div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06080a);

const camera = new THREE.PerspectiveCamera(45,1,0.01,1000);
camera.position.set(2,1.5,3);

const controls = new OrbitControls(camera,canvas);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff,0.8));
const dl = new THREE.DirectionalLight(0xffffff,1.2);
dl.position.set(3,5,3); scene.add(dl);

let meshes=[], selected=null;
const origMaterials=new Map();
const tags={};
const highlightMat=new THREE.MeshStandardMaterial({color:0x00c9a7,emissive:0x004433});

function resizeRenderer(){
  const wrap=document.getElementById('canvas-wrap');
  const w=wrap.clientWidth,h=wrap.clientHeight;
  renderer.setSize(w,h,false);
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
}
resizeRenderer();
new ResizeObserver(resizeRenderer).observe(document.getElementById('canvas-wrap'));

function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);}
animate();

// โหลด machine.glb จาก server โดยตรง
new GLTFLoader().load('./export/machine.glb', gltf=>{
  scene.add(gltf.scene);
  const box=new THREE.Box3().setFromObject(gltf.scene);
  const ctr=box.getCenter(new THREE.Vector3());
  const sz=box.getSize(new THREE.Vector3()).length();
  gltf.scene.position.sub(ctr);
  camera.position.set(0,sz*0.4,sz*1.2);
  controls.target.set(0,0,0);
  controls.update();

  gltf.scene.traverse(obj=>{
    if(!obj.isMesh) return;
    meshes.push(obj);
    const orig=Array.isArray(obj.material)?obj.material.map(m=>m.clone()):obj.material.clone();
    origMaterials.set(obj.uuid,orig);
  });

  buildList();
  document.getElementById('status').textContent=`โหลดสำเร็จ — ${meshes.length} mesh objects`;
}, xhr=>{
  if(xhr.total) document.getElementById('status').textContent=`Loading... ${Math.round(xhr.loaded/xhr.total*100)}%`;
}, err=>{
  document.getElementById('status').textContent='Error: '+err.message;
  document.getElementById('status').style.color='#f87171';
});

function buildList(){
  const pl=document.getElementById('part-list');
  pl.innerHTML='';
  meshes.forEach(m=>{
    const div=document.createElement('div');
    div.className='part-item';
    div.id='pi_'+m.uuid;
    div.innerHTML=`<div class="part-dot"></div><span class="part-name">${m.name||'(unnamed)'}</span>`;
    div.onclick=()=>selectMesh(m);
    pl.appendChild(div);
  });
}

function selectMesh(mesh){
  meshes.forEach(m=>{
    const orig=origMaterials.get(m.uuid);
    m.material=Array.isArray(orig)?orig.map(x=>x.clone()):orig.clone();
    document.getElementById('pi_'+m.uuid)?.classList.remove('active');
  });
  selected=mesh;
  mesh.material=highlightMat;
  const el=document.getElementById('pi_'+mesh.uuid);
  if(el){el.classList.add('active');el.scrollIntoView({block:'nearest'});}
  const banner=document.getElementById('selected-banner');
  banner.textContent='Selected: '+(mesh.name||'(unnamed)');
  banner.style.display='block';
  const ti=document.getElementById('tag-input');
  ti.disabled=false;
  ti.value=tags[mesh.name]||'';
  ti.focus();
}

document.getElementById('tag-input').addEventListener('input',e=>{
  if(!selected) return;
  tags[selected.name]=e.target.value;
});

window.setTag=function(t){
  if(!selected) return;
  tags[selected.name]=t;
  document.getElementById('tag-input').value=t;
};

canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const mouse=new THREE.Vector2(
    ((e.clientX-rect.left)/rect.width)*2-1,
   -((e.clientY-rect.top)/rect.height)*2+1
  );
  const ray=new THREE.Raycaster();
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(meshes,false);
  if(hits.length) selectMesh(hits[0].object);
});

window.exportMap=function(){
  const out={};
  Object.entries(tags).forEach(([name,role])=>{if(role) out[role]=name;});
  const txt=JSON.stringify(out,null,2);
  navigator.clipboard.writeText(txt).catch(()=>{});
  alert('Copied!\n\n'+txt);
};
</script>
</body>
</html>
