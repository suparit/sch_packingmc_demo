<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Machine Viewer</title>

  <!-- ✅ ต้องมีตัวนี้ -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    header {
      padding: 10px;
      background: #222;
      text-align: center;
    }

    model-viewer {
      width: 100%;
      height: 90vh;
      background: #000;
    }
  </style>
</head>

<body>

<header>
  <h2>Digital Twin - Packing Machine</h2>
</header>

<!-- ✅ ตรงนี้แหละ -->
<model-viewer 
  src="./export/machine.glb"
  auto-rotate
  camera-controls
  exposure="1"
  shadow-intensity="1">
</model-viewer>

</body>
</html>
